name: Update CTF Events

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-events:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run update script
        run: python updates/update_events.py src/data/events.ts

      - name: Commit and push changes
        run: |
          git config --global user.name "scrappy backend"
          git config --global user.email "backend@qu1ck5h0t_is_goated.com"
          git add src/data/events.ts
          if ! git diff --cached --quiet; then
            git commit -m "update CTFtime events"
            git push
          else
            echo "No changes to commit"
          fi
